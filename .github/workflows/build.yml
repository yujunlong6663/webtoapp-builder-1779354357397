name: Build Android APK

on:
  push:
    tags:
      - 'build-*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      
      - name: Verify Capacitor config
        run: |
          echo "=== WebToApp Build v3.4 (Capacitor) ==="
          echo "=== capacitor.config.json ==="
          cat capacitor.config.json
          echo ""
          echo "=== package.json ==="
          cat package.json
      
      - name: Add Android platform
        run: npx cap add android
      
      - name: Sync Capacitor
        run: npx cap sync android
      
      - name: Patch Android project
        run: python3 patch-permissions.py
      
      - name: Verify patched files
        run: |
          echo "=== AndroidManifest.xml ==="
          cat android/app/src/main/AndroidManifest.xml 2>/dev/null || echo "NOT FOUND"
          echo ""
          echo "=== MainActivity.java (first 20 lines) ==="
          find android/app/src/main/java -name "MainActivity.java" -exec head -20 {} \;
          echo ""
          echo "=== strings.xml ==="
          cat android/app/src/main/res/values/strings.xml 2>/dev/null || echo "NOT FOUND"
          echo ""
          echo "=== variables.gradle ==="
          cat android/variables.gradle 2>/dev/null || echo "NOT FOUND"
          echo ""
          echo "=== android/app/build.gradle ==="
          cat android/app/build.gradle 2>/dev/null || echo "NOT FOUND"
        continue-on-error: true
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v4
      
      - name: Install Android SDK components
        run: |
          yes | sdkmanager --licenses 2>/dev/null || true
          sdkmanager --install "platforms;android-35" "build-tools;35.0.0" "platform-tools"
      
      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace 2>&1
      
      - name: Verify APK
        run: |
          find android/app/build/outputs -name "*.apk" -type f
          test -f android/app/build/outputs/apk/debug/app-debug.apk || (echo "APK not found, listing all outputs:" && find android/app/build/outputs -type f && exit 1)
      
      - name: Upload APK to Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          files: android/app/build/outputs/apk/debug/app-debug.apk
          name: WebToApp Build ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
